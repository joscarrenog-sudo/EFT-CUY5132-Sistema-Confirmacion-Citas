;==============================================================================
; extensions_custom.conf  --  Sistema de confirmación de citas (CUY5132)
;------------------------------------------------------------------------------
; Pegar el contenido de este archivo al final de:
;     /etc/asterisk/extensions_custom.conf
; y recargar:
;     sudo asterisk -rx "dialplan reload"
;
; IMPORTANTE: en FreePBX el dialplan personalizado va SIEMPRE en
; extensions_custom.conf. Nunca editen extensions.conf (FreePBX lo regenera).
;==============================================================================

; --- Contexto del sistema de confirmación ---
[confirmacion-citas]
exten => _10XX,1,NoOp(=== Inicio confirmacion de cita para ${EXTEN} ===)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(confirmar_cita.agi,${EXTEN})
 same => n,Hangup()

exten => s,1,NoOp(=== Confirmacion de cita - entrada generica ===)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(confirmar_cita.agi,${CALLERID(num)})
 same => n,Hangup()

; --- Punto de entrada de PRUEBA (marcable desde un softphone) ---
; Marca 7000 para probar el sistema simulando la cita del anexo 1001.
; Cambien el 1001 por el anexo que quieran probar (debe existir en citas.csv).
[from-internal-custom]
exten => 7000,1,NoOp(=== Prueba sistema confirmacion citas ===)
 same => n,Goto(confirmacion-citas,${CALLERID(num)},1)
